name: Deploy Spring Boot to Server

on:
  push:
    branches:
      - staging
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # =====================
      # Checkout source code
      # =====================
      - name: Checkout code
        uses: actions/checkout@v3

      # =====================
      # Setup Java
      # =====================
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # =====================
      # Build application
      # =====================
      - name: Build with Maven
        run: |
          chmod +x ./mvnw
          ./mvnw clean package -DskipTests

      # =====================================================
      # STAGING DEPLOYMENT (branch: staging)
      # =====================================================
      - name: Setup SSH Agent (Staging)
        if: github.ref == 'refs/heads/staging'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}

      - name: Deploy to Staging Server
        if: github.ref == 'refs/heads/staging'
        run: |
          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.STAGING_SERVER_USER }}@${{ secrets.STAGING_SERVER_HOST }} << EOF
              sudo mkdir -p /opt/java-webservices
              sudo chown -R \$USER:\$USER /opt/java-webservices
              pkill -f 'portal-onboard-service.jar' || true
          EOF

          scp -o StrictHostKeyChecking=no target/*.jar \
            ${{ secrets.STAGING_SERVER_USER }}@${{ secrets.STAGING_SERVER_HOST }}:/opt/java-webservices/portal-onboard-service.jar

          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.STAGING_SERVER_USER }}@${{ secrets.STAGING_SERVER_HOST }} << EOF
              nohup java -jar \
                -Dspring.profiles.active=staging \
                /opt/java-webservices/portal-onboard-service.jar \
                > /opt/java-webservices/portal-staging.log 2>&1 &
          EOF

      # =====================================================
      # PRODUCTION DEPLOYMENT (branch: main)
      # secrets.PROD_SSH_PRIVATE_KEY
      # =====================================================
      - name: Setup SSH Agent (Production)
        if: github.ref == 'refs/heads/main'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to Production Server
        if: github.ref == 'refs/heads/main'
        run: |
          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << EOF
              sudo mkdir -p /opt/java-webservices
              sudo chown -R \$USER:\$USER /opt/java-webservices
              pkill -f 'portal-onboard-service.jar' || true
          EOF

          scp -o StrictHostKeyChecking=no target/*.jar \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/java-webservices/portal-onboard-service.jar

          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << EOF
              nohup java -jar \
                -Dspring.profiles.active=prod \
                /opt/java-webservices/portal-onboard-service.jar \
                > /opt/java-webservices/portal-prod.log 2>&1 &
          EOF




